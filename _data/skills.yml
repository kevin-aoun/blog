# Each entry becomes a card in the "Skills" section on the About page.
#   name: the skill's name
#   desc: a one-line "introspect" of what it does
#   url:  a PUBLIC link (its GitHub repo). Each skill lives in its own repo
#         under github.com/kevin-aoun/<skill>.
#   credit_name / credit_url: optional. Renders a "Shared with me by <name>"
#         line on the card, with <name> linking to credit_url.
- name: deckify
  desc: Build self-contained HTML slide decks in a reasoning-first workshop style.
  url: https://github.com/kevin-aoun/deckify
- name: readme
  desc: Write or standardize a project's docs as a README hub with reference and design docs.
  url: https://github.com/kevin-aoun/readme
- name: progress-report
  desc: Compile a one-slide Done / In progress / Next up phase progress board.
  url: https://github.com/kevin-aoun/progress-report

title: Kevin's Notes
description: Ideas on philosophy, tech, and whatever else is on my mind.
baseurl: "/blog"
url: "https://kevin-aoun.github.io"

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

color_scheme: dark
search_enabled: true

# Show line numbers on all fenced code blocks
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "GitHub":
    - "https://github.com/kevin-aoun"

footer_content: "© 2026 Kevin. Built with Jekyll + just-the-docs."

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

title: Kevin's Notes
description: Ideas on philosophy, tech, and whatever else is on my mind.
baseurl: "/blog"
url: "https://kevin-aoun.github.io"

# Raw source base for the note "Copy as Markdown" button (public repo, main branch).
repo_raw_base: "https://raw.githubusercontent.com/kevin-aoun/blog/main"

# Reading-time estimate. Auto-computed per post in _layouts/note.html as
#   minutes = ceil( chars / chars_per_min  +  images * image_seconds / 60 )
# from the rendered post body. Tune these knobs to taste; a single post can
# override the result with `minutes_read: <n>` in its own front matter.
reading:
  chars_per_min: 1500   # ~260 words/min; lower it to raise every estimate
  image_seconds: 12     # buffer added per image (figures take time to read)

# The model named in the reusable AI-assist disclaimer ({% include ai-disclaimer.html %}).
# Swap this one value when the model changes; every disclaimer updates.
ai_assist_model: "GPT 5.6 Sol"

# Minimal, self-contained setup — no remote theme.
# Layouts live in _layouts/, styles in assets/css/style.scss.

# Sidebar navigation. Items with a `section` auto-list their child notes
# (any page whose front matter has `parent: <section>`).
nav:
  - title: Home
    url: /
  - title: Tech
    url: /tech/
    section: Tech
  - title: Graph
    url: /graph/
  - title: About
    url: /about/

# Footer links (rendered with a Lucide ↗ icon, in order).
social:
  - name: twitter
    url: "https://x.com/kevin_aoun1"
  - name: linkedin
    url: "https://www.linkedin.com/in/kevin-w-aoun/"
  - name: github
    url: "https://github.com/kevin-aoun"

# Markdown / syntax highlighting.
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Notes are a collection: each file in _notes/ becomes a rendered note.
# Each note keeps its historical URL via a `permalink:` in its front matter.
collections:
  notes:
    output: true

# Default layouts: pages get `default`, notes get `note` (front matter can override).
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: notes
    values:
      layout: note

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - package.json
  - package-lock.json
  - preview.html
